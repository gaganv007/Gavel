AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Gavel - AI oracle for prediction markets (FastAPI on Lambda)

Globals:
  Function:
    Timeout: 90
    MemorySize: 1024
    Runtime: python3.11
    Architectures:
      - arm64

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
  OraclePrivateKey:
    Type: String
    NoEcho: true
  OracleContractAddress:
    Type: String
  BaseRpcUrl:
    Type: String
    Default: https://sepolia.base.org
  X402Enabled:
    Type: String
    Default: "true"
  X402Recipient:
    Type: String

Resources:
  GavelApi:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: api/
      Handler: lambda_handler.handler
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          ORACLE_PRIVATE_KEY: !Ref OraclePrivateKey
          ORACLE_CONTRACT_ADDRESS: !Ref OracleContractAddress
          BASE_RPC_URL: !Ref BaseRpcUrl
          X402_ENABLED: !Ref X402Enabled
          X402_RECIPIENT: !Ref X402Recipient
          BEDROCK_FALLBACK_ENABLED: "true"
          BEDROCK_MODEL_ID: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
      Policies:
        - Statement:
            - Sid: BedrockInvoke
              Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  GavelApiUrl:
    Description: "Gavel public API URL"
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
